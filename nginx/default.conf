client_max_body_size 100M;
server {
    listen 80;

    server_name phunattakitsupply.com www.phunattakitsupply.com;

    # certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # redirect -> https
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;

    server_name phunattakitsupply.com www.phunattakitsupply.com;

    ssl_certificate /etc/letsencrypt/live/phunattakitsupply.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phunattakitsupply.com/privkey.pem;

    # next.js
    location / {
        proxy_pass http://next-app:3000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # directus
    location /api/ {
        proxy_pass http://directus:8055/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
